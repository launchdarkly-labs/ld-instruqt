title: Evaluate Your AI with AgentControl
teaser: Otto is in production. Now make sure he stays good — with judges, experiments,
  guarded rollouts, and adaptive switching.
description: You've shipped an AI assistant. Now make sure it's any good — and stays
  that way. In this track you'll grade Otto against a labeled offline dataset, attach
  built-in judges, write two custom judges of your own (one whose grading criteria
  comes from the same snippet that drives Otto's prompt), run a prompt experiment
  on live traffic, configure a guarded rollout that catches a regression and auto-rolls
  back, and wire an in-app adaptive loop that flips Otto's targeting between requests
  when scores tank. Three safety nets at three different timescales — release-time,
  request-time, and per-request.
