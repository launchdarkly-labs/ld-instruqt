title: AgentControl Workshop — Evaluate
teaser: Test Otto offline, judge him in production, experiment on live traffic, and
  protect customers with guarded rollouts and adaptive switching.
description: |-
  Track 2 of the AgentControl workshop. Continuing where the
  Build track left off, you'll exercise the full evaluation
  surface of AgentControl: offline evaluations against a
  golden dataset, online judges (both built-in and custom),
  prompt experiments on live lab traffic, guarded rollouts
  that auto-revert regressions, and an in-app adaptive-
  switching loop. By the end Otto is measured, judged,
  experimented on, and protected by every safety net the
  product offers.
