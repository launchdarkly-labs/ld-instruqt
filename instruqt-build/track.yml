title: Build an AI Assistant with AgentControl
teaser: Take an AI assistant from placeholder line to production. Iterate prompts,
  swap models, target audiences, measure in flight — all without redeploying.
description: AgentControl lets you treat prompts, models, and targeting as runtime
  configuration instead of hardcoded values. In this track you'll build Otto — the
  shopping assistant for ToggleWear, a fictional online retailer of LaunchDarkly-branded
  apparel. You'll create his first Config, give him a personality, factor reusable
  brand voice into snippets, route premium shoppers to a more capable model, and watch
  how he behaves in production. By the end, Otto is live, on-brand, tier-aware, and
  monitored — and you've done it without touching deployment.
