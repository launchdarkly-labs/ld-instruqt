title: Coordinate Multi-Agent AI with AgentControl
teaser: Otto grows into a team. Build a multi-agent Concierge, route customers
  to specialists, and protect the brand voice with self-healing.
description: |-
  You've built an AI assistant and you've evaluated it. Now grow
  it into something bigger. In this track you'll create a multi-
  agent system — a triage agent routes customers to specialists
  (product, sizing, orders), and Otto becomes the brand-voice
  rewriter that polishes every response before it reaches the
  customer. Along the way you'll see mode-permanence in action,
  wire the Python SDK to traverse an agent graph, configure a
  guarded rollout that affects only one node, and add a
  per-request self-healing loop that catches off-brand responses
  before they ship.
